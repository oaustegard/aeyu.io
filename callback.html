<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aeyu.io — Connecting...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "preact": "https://esm.sh/preact@10.23.1",
          "preact/": "https://esm.sh/preact@10.23.1/",
          "@preact/signals": "https://esm.sh/@preact/signals@1.3.0?external=preact",
          "htm/preact": "https://esm.sh/htm@3.1.1/preact?external=preact"
        }
      }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center">
    <div id="status" class="text-center px-6 max-w-md">
        <p class="text-xl text-gray-600">Connecting to Strava...</p>
        <p class="text-sm text-gray-400 mt-2">Exchanging authorization code</p>
    </div>
    <script type="module">
      import { handleOAuthCallback } from "./src/auth.js";

      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const error = params.get("error");
      const statusEl = document.getElementById("status");

      if (error) {
        statusEl.innerHTML = `
          <p class="text-xl text-red-600">Authorization denied</p>
          <p class="text-sm text-gray-500 mt-2">${error}</p>
          <a href="/" class="inline-block mt-6 text-blue-600 hover:underline">Back to home</a>
        `;
      } else if (!code) {
        statusEl.innerHTML = `
          <p class="text-xl text-red-600">Missing authorization code</p>
          <a href="/" class="inline-block mt-4 text-blue-600 hover:underline">Back to home</a>
        `;
      } else {
        try {
          await handleOAuthCallback(code);
          window.location.href = "/#sync";
        } catch (err) {
          statusEl.innerHTML = `
            <p class="text-xl text-red-600">Connection failed</p>
            <p class="text-sm text-gray-500 mt-2">${err.message}</p>
            <a href="/" class="inline-block mt-6 text-blue-600 hover:underline">Try again</a>
          `;
        }
      }
    </script>
</body>
</html>
