<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>aeyu.io — Connecting...</title>

    <!-- PWA -->
    <meta name="theme-color" content="#FC4C02">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="stylesheet" href="/vendor/tailwind.css">
    <script type="importmap">
      {
        "imports": {
          "preact": "/vendor/preact.mjs",
          "preact/hooks": "/vendor/hooks.mjs",
          "@preact/signals": "/vendor/signals.mjs",
          "htm/preact": "/vendor/htm-preact.mjs"
        }
      }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex items-center justify-center">
    <div id="status" class="text-center px-6 max-w-md">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-gray-300 border-t-[#FC4C02] mb-4"></div>
        <p class="text-xl text-gray-600">Connecting to Strava...</p>
        <p class="text-sm text-gray-400 mt-2">Exchanging authorization code</p>
    </div>
    <script type="module">
      import { handleOAuthCallback } from "./src/auth.js";

      const params = new URLSearchParams(window.location.search);
      const code = params.get("code");
      const error = params.get("error");
      const statusEl = document.getElementById("status");

      if (error) {
        statusEl.innerHTML = `
          <p class="text-xl text-red-600">Authorization denied</p>
          <p class="text-sm text-gray-500 mt-2">${error}</p>
          <a href="/" class="inline-block mt-6 text-blue-600 hover:underline">Back to home</a>
        `;
      } else if (!code) {
        statusEl.innerHTML = `
          <p class="text-xl text-red-600">Missing authorization code</p>
          <a href="/" class="inline-block mt-4 text-blue-600 hover:underline">Back to home</a>
        `;
      } else {
        try {
          await handleOAuthCallback(code);
          window.location.replace("/dashboard");
        } catch (err) {
          statusEl.innerHTML = `
            <p class="text-xl text-red-600">Connection failed</p>
            <p class="text-sm text-gray-500 mt-2">${err.message}</p>
            <a href="/" class="inline-block mt-6 text-blue-600 hover:underline">Try again</a>
          `;
        }
      }
    </script>
</body>
</html>
