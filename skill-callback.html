<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Redirecting...</title></head>
<body>
<script>
// Bounce Strava's OAuth callback to the skill worker
const p = new URLSearchParams(window.location.search);
const target = 'https://strava-skill.austegard.workers.dev/auth/callback'
  + '?code=' + encodeURIComponent(p.get('code') || '')
  + '&state=' + encodeURIComponent(p.get('state') || '')
  + '&scope=' + encodeURIComponent(p.get('scope') || '');
window.location.replace(target);
</script>
</body></html>
