<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>aeyu.io Coach Bridge</title>
<style>
  body { font-family: system-ui; padding: 16px; background: #1a1a2e; color: #e0e0e0; font-size: 13px; }
  .status { padding: 4px 8px; border-radius: 4px; display: inline-block; margin: 4px 0; }
  .ok { background: #0f5323; color: #3fb950; }
  .err { background: #6e3630; color: #f85149; }
  .waiting { background: #2d333b; color: #8b949e; }
  pre { background: #0d1117; padding: 8px; border-radius: 4px; overflow-x: auto; font-size: 11px; }
  button { background: #f97316; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin: 4px; }
  button:hover { background: #ea580c; }
</style>
</head>
<body>
<div>aeyu.io coach bridge test</div>
<div id="status" class="status waiting">checking parent...</div>
<pre id="log"></pre>
<button onclick="sendMockRide()">Send Mock Ride</button>
<button onclick="sendMockPowerCurve()">Send Power Curve</button>

<script>
  const log = (msg) => {
    document.getElementById('log').textContent += new Date().toISOString().split('T')[1].slice(0,12) + ' ' + msg + '\n';
  };

  const setStatus = (text, cls) => {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status ' + cls;
  };

  // Check if we're in an iframe
  const inIframe = window.parent !== window;
  if (inIframe) {
    setStatus('In iframe — parent available', 'ok');
    log('window.parent !== window: true');
    log('Will postMessage to parent with origin: *');
  } else {
    setStatus('Not in iframe — standalone mode', 'waiting');
    log('Running standalone. Embed this page in an artifact iframe to test postMessage.');
  }

  function sendToParent(data) {
    if (!inIframe) {
      log('ERROR: Not in iframe, cannot postMessage to parent');
      return;
    }
    try {
      window.parent.postMessage(data, '*');
      log('SENT: ' + JSON.stringify(data).substring(0, 200));
      setStatus('Message sent!', 'ok');
    } catch(e) {
      log('ERROR: ' + e.message);
      setStatus('Send failed: ' + e.message, 'err');
    }
  }

  function sendMockRide() {
    sendToParent({
      type: 'aeyu-ride',
      __test: 'iframe-child',
      ride: {
        id: 12345678,
        name: 'Rock Creek Park Loop',
        date: '2026-03-22',
        distance_km: 42.3,
        elapsed_time_s: 5400,
        moving_time_s: 4800,
        elevation_gain_m: 380,
        avg_power: 210,
        normalized_power: 225,
        avg_hr: 148,
        max_hr: 172,
        avg_cadence: 88,
        intensity_factor: 0.82,
        tss: 65,
        segments: [
          { name: 'Beach Dr Northbound', elapsed: 420, avg_power: 235, avg_hr: 155 },
          { name: 'Military Rd Climb', elapsed: 180, avg_power: 310, avg_hr: 168 },
          { name: 'Oregon Ave Recovery', elapsed: 360, avg_power: 175, avg_hr: 138 }
        ]
      }
    });
  }

  function sendMockPowerCurve() {
    sendToParent({
      type: 'aeyu-power-curve',
      __test: 'iframe-child',
      curve: {
        rider: 'Oskar',
        date: '2026-03-22',
        // duration_seconds: max_watts pairs
        points: [
          [1, 850], [5, 720], [10, 620], [30, 450],
          [60, 380], [120, 320], [300, 280], [600, 255],
          [1200, 235], [1800, 220], [3600, 205]
        ]
      }
    });
  }

  // Auto-send a ping on load if in iframe
  if (inIframe) {
    sendToParent({
      type: 'aeyu-ping',
      __test: 'iframe-child',
      msg: 'Coach bridge loaded',
      origin: location.origin,
      ts: Date.now()
    });
  }
</script>
</body>
</html>
